<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Leaflet Click Coordinate</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <style>
        
        #map {height: 100dvh; width: 100%}
        
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    // Vengono passate, se presenti, le coordinate da altre applicazioni, altrimenti default.
    const params = new URLSearchParams(window.location.search);
    const defaultLat = 37.98058;
    const defaultLng = 12.55220;
    const lat = parseFloat(params.get("lat"));
    const lng = parseFloat(params.get("lng"));
    const finalLat = (!isNaN(lat)) ? lat : defaultLat;
    const finalLng = (!isNaN(lng)) ? lng : defaultLng;
    const map = L.map('map').setView([finalLat, finalLng], 11);
    
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;

        console.log("Latitudine:", lat);
        console.log("Longitudine:", lng);

        alert(`Lat: ${lat}\nLng: ${lng}`);
    });

    L.marker([finalLat, finalLng]).addTo(map);

    L.circle([finalLat, finalLng], {
        radius: 80,          // metri
        color: "#2563eb",
        fillColor: "#3b82f6",
        fillOpacity: 0.25,
        weight: 2
    }).addTo(map);    

</script>
</body>
</html>
