<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Leaflet Click Coordinate</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <style>
        #map {
            height: 757px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([38.1157, 13.3615], 13);

    // Vengono passate le coordinate da altre applicazioni
    const params = new URLSearchParams(window.location.search);
    const lat = parseFloat(params.get("lat")) || 38.1157;
    const lng = parseFloat(params.get("lng")) || 13.3615;
    const map = L.map('map').setView([lat, lng], 13);
    
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;

        console.log("Latitudine:", lat);
        console.log("Longitudine:", lng);

        alert(`Lat: ${lat}\nLng: ${lng}`);
    });
</script>

</body>
</html>
